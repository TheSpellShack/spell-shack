<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product — The Spell Shack</title>
<link rel="stylesheet" href="style.css">
<style>
body{margin:0;font-family:'Georgia',serif;background:#0a0a0a;color:#eee;overflow-x:hidden;opacity:0;transition:opacity 0.6s;}
header{text-align:center;font-size:2.5em;padding:50px 20px 20px 20px;color:#ddd;}
nav{display:flex;justify-content:center;gap:50px;padding:15px 0;border-bottom:1px solid #222;margin-bottom:40px;}
nav a{color:#ccc;text-decoration:none;font-weight:normal;font-size:1.1em;transition:0.2s;}
nav a:hover{color:#fff;text-decoration:underline;}
.product-page{display:flex;flex-wrap:wrap;justify-content:center;gap:50px;padding:50px 20px;}
.product-image{max-width:300px;border-radius:12px;}
.product-details{max-width:400px;}
.product-details h2{font-size:2em;margin-bottom:20px;}
.product-details p{color:#aaa;font-size:1em;line-height:1.5;margin-bottom:20px;}
.product-details .price{font-weight:bold;font-size:1.2em;margin-bottom:20px;}
.product-details button{padding:10px 25px;border:1px solid #333;background:transparent;color:#ccc;cursor:pointer;transition:0.3s;border-radius:6px;}
.product-details button:hover{background:rgba(255,255,255,0.05);border-color:#aaa;color:#fff;}
.product-details button:active{transform:scale(0.95);}
#cart{position:fixed;top:30px;right:30px;background:rgba(10,10,10,0.95);border:1px solid #333;padding:15px 20px;width:260px;max-height:400px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.6);font-size:0.95em;display:flex;flex-direction:column;transition:max-height 0.3s ease,padding 0.3s ease;z-index:1000;}
#cart-header{display:flex;justify-content:space-between;align-items:center;font-size:1.1em;font-weight:bold;color:#eee;margin-bottom:10px;letter-spacing:0.5px;border-bottom:1px solid #222;padding-bottom:5px;cursor:pointer;}
#cart-count{background:#444;color:#fff;padding:2px 8px;border-radius:50%;font-size:0.8em;font-weight:normal;}
#cart-body{overflow-y:auto;max-height:350px;}
#cart.minimized{max-height:50px;padding:10px 15px;}
#cart.minimized #cart-body{max-height:0;opacity:0;overflow:hidden;}
.cart-item{border-bottom:1px solid #222;padding:10px 0;display:flex;justify-content:space-between;align-items:center;color:#ccc;}
.cart-item:last-child{border-bottom:none;}
.remove-btn{cursor:pointer;color:#888;font-size:0.85em;border:none;background:none;}
.remove-btn:hover{color:#fff;}
#back-to-top{position:fixed;bottom:30px;right:30px;background:rgba(50,50,50,0.7);color:#fff;border:none;padding:10px 15px;border-radius:8px;cursor:pointer;font-size:1.2em;display:none;z-index:999;transition:0.3s;}
#back-to-top:hover{background:rgba(100,100,100,0.9);}
#back-to-top:active{transform:scale(0.95);}
#newsletter{margin-top:20px;text-align:center;}
#newsletter input{padding:8px 12px;border-radius:6px;border:1px solid #555;margin-right:5px;background:#111;color:#eee;}
#newsletter button{padding:8px 15px;border-radius:6px;border:1px solid #555;background:rgba(255,255,255,0.05);color:#eee;cursor:pointer;}
#newsletter button:hover{background:rgba(255,255,255,0.1);}
@media(max-width:700px){.product-page{flex-direction:column;align-items:center;} #cart{width:90%;right:5%;}}
</style>
</head>
<body>

<header>THE SPELL SHACK</header>
<nav><a href="index.html">HOME</a><a href="shop.html">SHOP</a><a href="contact.html">CONTACT</a></nav>

<div class="product-page">
  <img id="product-img" class="product-image" src="" alt="">
  <div class="product-details">
    <h2 id="product-name"></h2>
    <p id="product-desc"></p>
    <div class="price" id="product-price"></div>
    <button id="add-to-cart">Add to Cart</button>
  </div>
</div>

<div id="cart">
  <div id="cart-header" onclick="toggleCart()"><span>🛒 Cart</span><span id="cart-count">0</span></div>
  <div id="cart-body"><div id="cart-items"></div><div id="cart-total">Total: £0.00</div></div>
</div>

<button id="back-to-top">↑</button>

<footer>
<div id="newsletter"><p>Join our mystical newsletter:</p><input type="email" id="email" placeholder="Your email"><button id="subscribe">Subscribe</button></div>
© The Spell Shack
</footer>

<script>
// ===== Fade-in =====
window.addEventListener('load',()=>{document.body.style.opacity=1;});

// ===== Back-to-top =====
const backToTop=document.getElementById('back-to-top');
window.addEventListener('scroll',()=>{backToTop.style.display=window.scrollY>300?'block':'none';});
backToTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

// ===== Products Data =====
const products={
"unknown-object":{name:"Unknown Object",price:3.99,desc:"No clear origin. Found, not made.",img:"images/unknown-object.png"},
"fragment-01":{name:"Fragment 01",price:2.49,desc:"Part of something larger. Handle with care.",img:"images/fragment-01.png"},
"signal-record":{name:"Signal Record",price:4.99,desc:"Contains something unusual. For serious collectors.",img:"images/signal-record.png"}
};
function getQueryVariable(variable){const query=window.location.search.substring(1);const vars=query.split("&");for(let i=0;i<vars.length;i++){const pair=vars[i].split("=");if(pair[0]==variable)return pair[1];}return false;}
const slug=getQueryVariable("item");
if(!products[slug]){document.body.innerHTML="<h2 style='color:#ccc;text-align:center;padding:100px;'>Product not found</h2>";}
else{const p=products[slug];document.getElementById("product-name").innerText=p.name;document.getElementById("product-desc").innerText=p.desc;document.getElementById("product-price").innerText=`£${p.price.toFixed(2)}`;document.getElementById("product-img").src=p.img;document.getElementById("product-img").alt=p.name;}

// ===== Cart system =====
const cartItems=JSON.parse(localStorage.getItem("cartItems"))||[];
const cartContainer=document.getElementById("cart-items");
const cartTotal=document.getElementById("cart-total");
const cartCount=document.getElementById("cart-count");
function saveCart(){localStorage.setItem("cartItems",JSON.stringify(cartItems));}
function updateCart(){cartContainer.innerHTML="";if(cartItems.length===0){cartContainer.innerHTML="<p style='color:#888;text-align:center;'>Your cart is empty</p>";}let total=0;cartItems.forEach((item,index)=>{total+=item.price;const div=document.createElement("div");div.classList.add("cart-item");div.innerHTML=`<span>${item.name} - £${item.price.toFixed(2)}</span><button class="remove-btn" onclick="removeFromCart(${index})">x</button>`;cartContainer.appendChild(div);});cartTotal.innerText=`Total: £${total.toFixed(2)}`;cartCount.innerText=cartItems.length;saveCart();}
document.getElementById("add-to-cart").addEventListener("click",()=>{const p=products[slug];cartItems.push({name:p.name,price:p.price});updateCart();});
function removeFromCart(index){cartItems.splice(index,1);updateCart();}
function toggleCart(){document.getElementById("cart").classList.toggle("minimized");}
updateCart();

// ===== Newsletter =====
document.getElementById('subscribe').addEventListener('click',()=>{const email=document.getElementById('email').value;if(email){let list=JSON.parse(localStorage.getItem('newsletter'))||[];list.push(email);localStorage.setItem('newsletter',JSON.stringify(list));alert("Subscribed! Thank you.");document.getElementById('email').value='';}});
</script>

</body>
</html>
